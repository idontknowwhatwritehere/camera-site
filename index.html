<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Сравнение яркости</title>

<style>
* {
  box-sizing: border-box;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  -webkit-tap-highlight-color: transparent;
}

html,
body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  overscroll-behavior: none;
  background: #070707;
  color: white;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
}

body {
  position: fixed;
  inset: 0;
  width: 100%;
  height: var(--app-height, 100dvh);
}

button {
  border: none;
  outline: none;
  cursor: pointer;
  font-family: inherit;
  font-weight: 800;
  background: #00d084;
  color: #04140d;
  border-radius: 14px;
}

.app {
  position: fixed;
  inset: 0;
  width: 100%;
  height: var(--app-height, 100dvh);
  overflow: hidden;
  background: linear-gradient(135deg, #050505, #171717);
  display: flex;
  justify-content: center;
  padding:
    calc(env(safe-area-inset-top) + clamp(5px, 1.2dvh, 8px))
    10px
    calc(env(safe-area-inset-bottom) + clamp(7px, 1.4dvh, 10px));
}

.content {
  width: 100%;
  max-width: 430px;
  height: 100%;
  min-width: 0;
  min-height: 0;

  display: grid;
  grid-template-rows: auto minmax(0, 1fr) auto;
  gap: clamp(5px, 1.2dvh, 9px);

  overflow: hidden;
}

.header,
.footer {
  min-width: 0;
  min-height: 0;
  display: grid;
  gap: clamp(5px, 1dvh, 8px);
}

.footer {
  justify-items: center;
}

.top-bar {
  width: 100%;
  height: clamp(32px, 5.2dvh, 38px);
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  min-width: 0;
}

.icon-btn {
  width: clamp(32px, 5.2dvh, 38px);
  height: clamp(32px, 5.2dvh, 38px);
  min-width: clamp(32px, 5.2dvh, 38px);
  padding: 0;
  border-radius: 13px;
  font-size: clamp(18px, 4vw, 20px);
  line-height: 1;
  background: rgba(255,255,255,.14);
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
}

.login-btn {
  height: clamp(32px, 5.2dvh, 38px);
  max-width: 55%;
  padding: 0 16px;
  border-radius: 19px;
  font-size: clamp(13px, 3.4vw, 15px);
  background: rgba(255,255,255,.14);
  color: white;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.mode-buttons {
  width: 100%;
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
  gap: 8px;
}

.mode-buttons button {
  width: 100%;
  height: clamp(32px, 5.2dvh, 38px);
  min-width: 0;
  padding: 0 6px;
  font-size: clamp(13px, 3.8vw, 18px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

button.secondary {
  background: rgba(255,255,255,.15);
  color: white;
}

h1 {
  margin: 0;
  font-size: clamp(20px, 6vw, 34px);
  line-height: 1.05;
  text-align: center;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.top-text {
  margin: 0;
  font-size: clamp(10px, 3.2vw, 15px);
  line-height: 1.2;
  color: #cfcfcf;
  text-align: center;
  overflow: hidden;
}

.camera-box {
  position: relative;
  min-width: 0;
  min-height: 0;
  height: 100%;
  border-radius: clamp(16px, 4vw, 22px);
  overflow: hidden;
  background: #111;
  box-shadow: 0 10px 26px rgba(0,0,0,.55);
  border: 2px solid rgba(255,255,255,.12);
  touch-action: none;
}

video,
canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  pointer-events: none;
}

#startBtn {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  max-width: calc(100% - 24px);
  height: clamp(36px, 6dvh, 42px);
  padding: 0 18px;
  z-index: 5;
  font-size: clamp(13px, 3.5vw, 15px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: 0 10px 30px rgba(0,255,170,.35);
}

#scanBtn {
  display: none;
  position: absolute;
  left: 50%;
  bottom: 10px;
  transform: translateX(-50%);
  z-index: 6;

  width: fit-content;
  max-width: calc(100% - 20px);
  height: clamp(32px, 5.2dvh, 38px);
  padding: 0 20px;
  font-size: clamp(13px, 3.5vw, 15px);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  box-shadow: 0 8px 24px rgba(0,0,0,.4);
}

.result {
  width: 100%;
  min-height: clamp(30px, 5.7dvh, 42px);
  padding: 0 6px;
  font-size: clamp(18px, 5.8vw, 31px);
  font-weight: 900;
  line-height: 1.05;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.bottom-text {
  width: 100%;
  min-height: clamp(18px, 3.2dvh, 22px);
  padding-bottom: 2px;
  font-size: clamp(10px, 3.2vw, 15px);
  line-height: 1.15;
  color: #aaaaaa;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  white-space: nowrap;
  text-overflow: ellipsis;
}

.shade {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.45);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
  z-index: 20;
}

.shade.open {
  opacity: 1;
  pointer-events: auto;
}

.side-menu {
  position: fixed;
  left: 0;
  top: 0;
  width: min(82vw, 310px);
  height: var(--app-height, 100dvh);
  padding:
    calc(env(safe-area-inset-top) + 14px)
    14px
    calc(env(safe-area-inset-bottom) + 14px);
  background: rgba(18,18,18,.96);
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  transform: translateX(-105%);
  transition: transform .28s ease;
  z-index: 30;
  box-shadow: 20px 0 50px rgba(0,0,0,.45);
  border-right: 1px solid rgba(255,255,255,.12);
  overflow-y: auto;
}

.side-menu.open {
  transform: translateX(0);
}

.side-menu-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}

.side-menu-header strong {
  display: block;
  font-size: 22px;
}

.side-menu-header span {
  display: block;
  margin-top: 3px;
  font-size: 12px;
  color: #aaa;
}

#closeMenuBtn {
  width: 34px;
  height: 34px;
  min-width: 34px;
  padding: 0;
  border-radius: 12px;
  background: rgba(255,255,255,.12);
  color: white;
  font-size: 24px;
}

.menu-text {
  width: 100%;
  min-height: 44px;
  margin-bottom: 10px;
  padding: 12px 14px;
  border-radius: 14px;
  background: rgba(255,255,255,.1);
  color: white;
  font-size: 15px;
  font-weight: 800;
}

.login-modal {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px;
  background: rgba(0,0,0,.55);
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease;
  z-index: 40;
}

.login-modal.open {
  opacity: 1;
  pointer-events: auto;
}

.login-card {
  position: relative;
  width: 100%;
  max-width: 330px;
  padding: 22px;
  border-radius: 24px;
  background: rgba(22,22,22,.96);
  border: 1px solid rgba(255,255,255,.12);
  box-shadow: 0 20px 60px rgba(0,0,0,.55);
  text-align: center;
}

.login-card h2 {
  margin: 0 0 8px;
  font-size: 24px;
}

.login-card p {
  margin: 0 0 16px;
  color: #aaa;
  font-size: 13px;
  line-height: 1.35;
}

.login-card input {
  width: 100%;
  height: 44px;
  margin-bottom: 10px;
  padding: 0 14px;
  border: none;
  border-radius: 14px;
  background: rgba(255,255,255,.1);
  color: white;
  font-size: 15px;
  outline: none;
}

.login-card input::placeholder {
  color: #888;
}

#fakeLoginBtn {
  width: 100%;
  height: 44px;
  margin-top: 4px;
}

.close-login {
  position: absolute;
  right: 12px;
  top: 12px;
  width: 32px;
  height: 32px;
  padding: 0;
  border-radius: 12px;
  background: rgba(255,255,255,.12);
  color: white;
  font-size: 22px;
}

@media (max-height: 720px) {
  .app {
    padding:
      calc(env(safe-area-inset-top) + 5px)
      8px
      calc(env(safe-area-inset-bottom) + 8px);
  }

  .content {
    gap: 5px;
  }

  .header,
  .footer {
    gap: 4px;
  }

  h1 {
    font-size: clamp(20px, 5.5vw, 27px);
  }

  .top-text {
    font-size: clamp(10px, 3vw, 13px);
    line-height: 1.1;
  }

  .result {
    min-height: 30px;
    font-size: clamp(18px, 5.5vw, 25px);
  }

  .bottom-text {
    min-height: 18px;
    font-size: clamp(10px, 3vw, 13px);
  }
}

@media (max-height: 610px) {
  .top-text,
  .bottom-text {
    display: none;
  }

  .header,
  .footer {
    gap: 3px;
  }

  h1 {
    font-size: clamp(18px, 5vw, 24px);
  }

  .result {
    min-height: 28px;
  }

  #scanBtn {
    bottom: 7px;
  }
}

@media (max-height: 520px) {
  .login-btn {
    padding: 0 12px;
  }

  .mode-buttons {
    gap: 6px;
  }

  .mode-buttons button {
    font-size: clamp(12px, 3.6vw, 14px);
  }

  h1 {
    font-size: clamp(17px, 4.8vw, 21px);
  }

  .result {
    font-size: clamp(16px, 5vw, 21px);
  }
}
</style>
</head>

<body>

<div class="app">
  <div class="content">

    <div class="header">
      <div class="top-bar">
        <button class="icon-btn" id="menuBtn">☰</button>
        <button class="login-btn" id="loginBtn">Вход</button>
      </div>

      <div class="mode-buttons">
        <button id="liveModeBtn">Версия 1</button>
        <button id="scanModeBtn" class="secondary">Версия 2</button>
      </div>

      <h1>Сравнение яркости</h1>

      <div class="top-text">
        Двигайте линии пальцем. Высота меняется для обеих сразу.
      </div>
    </div>

    <div class="camera-box" id="cameraBox">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="overlay"></canvas>
      <button id="startBtn">Открыть камеру</button>
      <button id="scanBtn">Сканировать 10 секунд</button>
    </div>

    <div class="footer">
      <div class="result" id="result">Камера не открыта</div>

      <div class="bottom-text">
        Более тёмная линия подсвечивается красным
      </div>
    </div>

  </div>
</div>

<div class="shade" id="shade"></div>

<div class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <div>
      <strong>Меню</strong>
      <span>Просто текст</span>
    </div>
    <button id="closeMenuBtn">×</button>
  </div>

  <div class="menu-text">Текст 1</div>
  <div class="menu-text">Текст 2</div>
  <div class="menu-text">Текст 3</div>
  <div class="menu-text">Текст 4</div>
</div>

<div class="login-modal" id="loginModal">
  <div class="login-card">
    <button class="close-login" id="closeLoginBtn">×</button>

    <h2>Вход</h2>
    <p>Пока это демо-окно. Здесь потом можно сделать авторизацию.</p>

    <input type="text" placeholder="Имя">
    <input type="password" placeholder="Пароль">

    <button id="fakeLoginBtn">Войти</button>
  </div>
</div>

<script>
function setAppHeight() {
  const height = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  document.documentElement.style.setProperty("--app-height", `${height}px`);
}

setAppHeight();

window.addEventListener("resize", setAppHeight);
window.addEventListener("orientationchange", setAppHeight);

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", setAppHeight);
  window.visualViewport.addEventListener("scroll", setAppHeight);
}

document.addEventListener("touchmove", e => {
  if (
    e.target.closest(".login-card") ||
    e.target.closest(".side-menu")
  ) {
    return;
  }

  e.preventDefault();
}, { passive: false });

const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");
const scanBtn = document.getElementById("scanBtn");
const cameraBox = document.getElementById("cameraBox");

const liveModeBtn = document.getElementById("liveModeBtn");
const scanModeBtn = document.getElementById("scanModeBtn");

const menuBtn = document.getElementById("menuBtn");
const closeMenuBtn = document.getElementById("closeMenuBtn");
const sideMenu = document.getElementById("sideMenu");
const shade = document.getElementById("shade");

const loginBtn = document.getElementById("loginBtn");
const loginModal = document.getElementById("loginModal");
const closeLoginBtn = document.getElementById("closeLoginBtn");
const fakeLoginBtn = document.getElementById("fakeLoginBtn");

const hiddenCanvas = document.createElement("canvas");
const hiddenCtx = hiddenCanvas.getContext("2d", { willReadFrequently: true });

let cameraStarted = false;
let animationStarted = false;
let mode = "live";

const lines = [
  { x: 38 },
  { x: 62 }
];

let lineY1 = 25;
let lineY2 = 75;

let activeLine = null;
let resizingEdge = null;

const AVERAGE_TIME = 10000;

let liveHistory = [];

let isScanning = false;
let scanStartTime = 0;
let scanData = [];
let finalScanResult = null;

function openMenu() {
  sideMenu.classList.add("open");
  shade.classList.add("open");
}

function closeMenu() {
  sideMenu.classList.remove("open");
  shade.classList.remove("open");
}

function openLogin() {
  loginModal.classList.add("open");
}

function closeLogin() {
  loginModal.classList.remove("open");
}

menuBtn.addEventListener("click", openMenu);
closeMenuBtn.addEventListener("click", closeMenu);
shade.addEventListener("click", closeMenu);

loginBtn.addEventListener("click", openLogin);
closeLoginBtn.addEventListener("click", closeLogin);

loginModal.addEventListener("click", e => {
  if (e.target === loginModal) closeLogin();
});

fakeLoginBtn.addEventListener("click", () => {
  loginBtn.textContent = "Гость";
  closeLogin();
});

liveModeBtn.addEventListener("click", () => {
  mode = "live";
  isScanning = false;
  scanData = [];
  finalScanResult = null;
  liveHistory = [];

  scanBtn.style.display = "none";

  liveModeBtn.classList.remove("secondary");
  scanModeBtn.classList.add("secondary");

  result.textContent = cameraStarted ? "Живой режим" : "Камера не открыта";
});

scanModeBtn.addEventListener("click", () => {
  mode = "scan";
  isScanning = false;
  scanData = [];
  finalScanResult = null;
  liveHistory = [];

  scanBtn.style.display = cameraStarted ? "block" : "none";

  scanModeBtn.classList.remove("secondary");
  liveModeBtn.classList.add("secondary");

  result.textContent = cameraStarted
    ? "Зафиксируйте камеру и нажмите сканирование"
    : "Камера не открыта";
});

startBtn.addEventListener("click", async e => {
  e.stopPropagation();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();

      cameraStarted = true;
      startBtn.style.display = "none";

      if (mode === "scan") {
        scanBtn.style.display = "block";
      }

      result.textContent = mode === "live"
        ? "Живой режим"
        : "Зафиксируйте камеру и нажмите сканирование";

      if (!animationStarted) {
        animationStarted = true;
        loop();
      }
    };

  } catch (err) {
    result.textContent = "Ошибка открытия камеры";
    alert("Ошибка камеры: " + err.message);
  }
});

scanBtn.addEventListener("click", e => {
  e.stopPropagation();

  if (!cameraStarted || isScanning) return;

  scanData = [];
  finalScanResult = null;
  isScanning = true;
  scanStartTime = performance.now();

  result.textContent = "Сканирование: 10.0 сек";
});

cameraBox.addEventListener("pointerdown", e => {
  if (e.target.closest("button")) return;

  e.preventDefault();

  const pos = getPointerPercent(e);

  const dLine0 = Math.abs(pos.x - lines[0].x);
  const dLine1 = Math.abs(pos.x - lines[1].x);

  const dTop = Math.abs(pos.y - lineY1);
  const dBottom = Math.abs(pos.y - lineY2);

  if (dTop < 7) {
    resizingEdge = "top";
    activeLine = null;
  } else if (dBottom < 7) {
    resizingEdge = "bottom";
    activeLine = null;
  } else {
    activeLine = dLine0 < dLine1 ? 0 : 1;
    resizingEdge = null;
  }

  cameraBox.setPointerCapture(e.pointerId);
});

cameraBox.addEventListener("pointermove", e => {
  e.preventDefault();

  if (activeLine === null && resizingEdge === null) return;

  const pos = getPointerPercent(e);

  if (resizingEdge === "top") {
    lineY1 = clamp(pos.y, 5, lineY2 - 12);
  }

  if (resizingEdge === "bottom") {
    lineY2 = clamp(pos.y, lineY1 + 12, 95);
  }

  if (activeLine !== null) {
    lines[activeLine].x = clamp(pos.x, 6, 94);
  }
});

cameraBox.addEventListener("pointerup", stopDrag);
cameraBox.addEventListener("pointercancel", stopDrag);

function stopDrag(e) {
  if (e) e.preventDefault();

  activeLine = null;
  resizingEdge = null;

  liveHistory = [];
  scanData = [];
  finalScanResult = null;
  isScanning = false;

  if (mode === "scan" && cameraStarted) {
    result.textContent = "Положение изменено. Нажмите сканирование заново";
  }
}

function getPointerPercent(e) {
  const rect = cameraBox.getBoundingClientRect();

  return {
    x: ((e.clientX - rect.left) / rect.width) * 100,
    y: ((e.clientY - rect.top) / rect.height) * 100
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function resizeCanvas() {
  const box = cameraBox.getBoundingClientRect();
  const pixelRatio = window.devicePixelRatio || 1;

  const canvasWidth = Math.round(box.width * pixelRatio);
  const canvasHeight = Math.round(box.height * pixelRatio);

  if (canvas.width !== canvasWidth || canvas.height !== canvasHeight) {
    canvas.width = canvasWidth;
    canvas.height = canvasHeight;

    canvas.style.width = `${box.width}px`;
    canvas.style.height = `${box.height}px`;
  }

  ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);

  if (
    hiddenCanvas.width !== video.videoWidth ||
    hiddenCanvas.height !== video.videoHeight
  ) {
    hiddenCanvas.width = video.videoWidth;
    hiddenCanvas.height = video.videoHeight;
  }
}

function getVisualLines() {
  const sorted = [...lines].sort((a, b) => a.x - b.x);

  return {
    left: sorted[0],
    right: sorted[1]
  };
}

function getBrightness(line) {
  const w = hiddenCanvas.width;
  const h = hiddenCanvas.height;

  const x = clamp(Math.round(line.x / 100 * w), 0, w - 1);
  const y1 = lineY1 / 100 * h;
  const y2 = lineY2 / 100 * h;

  const steps = 120;
  let total = 0;

  for (let i = 0; i < steps; i++) {
    const t = i / (steps - 1);
    const y = clamp(Math.round(y1 + (y2 - y1) * t), 0, h - 1);

    const pixel = hiddenCtx.getImageData(x, y, 1, 1).data;
    total += 0.299 * pixel[0] + 0.587 * pixel[1] + 0.114 * pixel[2];
  }

  return total / steps;
}

function addLiveAverage(left, right) {
  const now = performance.now();

  liveHistory.push({ time: now, left, right });

  while (liveHistory.length && now - liveHistory[0].time > AVERAGE_TIME) {
    liveHistory.shift();
  }
}

function getAverage(data) {
  if (!data.length) return null;

  let left = 0;
  let right = 0;

  for (const item of data) {
    left += item.left;
    right += item.right;
  }

  return {
    left: left / data.length,
    right: right / data.length
  };
}

function formatResult(avg, digits) {
  if (!avg) return "Нет данных";

  const max = Math.max(avg.left, avg.right);
  const min = Math.min(avg.left, avg.right);

  const percent = min > 0 ? ((max - min) / min) * 100 : 0;

  if (avg.left > avg.right) {
    return `Левая ярче на ${percent.toFixed(digits)}%`;
  }

  if (avg.right > avg.left) {
    return `Правая ярче на ${percent.toFixed(digits)}%`;
  }

  return "Яркость одинаковая";
}

function drawLine(line, isDarker) {
  const box = cameraBox.getBoundingClientRect();

  const x = line.x / 100 * box.width;
  const y1 = lineY1 / 100 * box.height;
  const y2 = lineY2 / 100 * box.height;

  ctx.lineWidth = 7;
  ctx.lineCap = "round";

  ctx.strokeStyle = isDarker
    ? "rgba(255, 70, 70, 0.55)"
    : "rgba(0, 255, 150, 0.42)";

  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.45)";

  ctx.beginPath();
  ctx.arc(x, y1, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y2, 8, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  if (!cameraStarted) return;

  if (video.videoWidth && video.videoHeight) {
    resizeCanvas();

    hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);

    const box = cameraBox.getBoundingClientRect();
    ctx.clearRect(0, 0, box.width, box.height);

    const visual = getVisualLines();

    const leftNow = getBrightness(visual.left);
    const rightNow = getBrightness(visual.right);

    let drawAverage = {
      left: leftNow,
      right: rightNow
    };

    if (mode === "live") {
      addLiveAverage(leftNow, rightNow);

      const avg = getAverage(liveHistory);
      drawAverage = avg || drawAverage;

      result.textContent = formatResult(avg, 1);
    }

    if (mode === "scan") {
      if (isScanning) {
        const now = performance.now();
        const elapsed = now - scanStartTime;
        const remaining = Math.max(0, (AVERAGE_TIME - elapsed) / 1000);

        scanData.push({
          left: leftNow,
          right: rightNow
        });

        result.textContent = `Сканирование: ${remaining.toFixed(1)} сек`;

        if (elapsed >= AVERAGE_TIME) {
          isScanning = false;
          finalScanResult = getAverage(scanData);
          result.textContent = formatResult(finalScanResult, 2);
        }

        drawAverage = getAverage(scanData) || drawAverage;
      } else if (finalScanResult) {
        drawAverage = finalScanResult;
      }
    }

    drawLine(visual.left, drawAverage.left < drawAverage.right);
    drawLine(visual.right, drawAverage.right < drawAverage.left);
  }

  requestAnimationFrame(loop);
}
</script>
