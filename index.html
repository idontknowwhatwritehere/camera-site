<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сравнение яркости</title>

<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(135deg, #050505, #1a1a1a);
    color: white;
    font-family: "Segoe UI", Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  .app {
    width: 100%;
    max-width: 430px;
    padding: 20px;
    text-align: center;
  }

  h1 {
    margin: 0 0 14px;
    font-size: 26px;
  }

  .top-text {
    margin-bottom: 14px;
    font-size: 15px;
    color: #cccccc;
  }

  .camera-box {
    position: relative;
    width: 100%;
    aspect-ratio: 3 / 4;
    border-radius: 24px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 20px 50px rgba(0,0,0,.6);
    border: 2px solid rgba(255,255,255,.12);
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }

  video,
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    user-select: none;
    -webkit-user-select: none;
    pointer-events: none;
  }

  button {
    margin-top: 18px;
    padding: 14px 26px;
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #00ff88, #00b7ff);
    color: black;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
  }

  .result {
    margin-top: 22px;
    font-size: 24px;
    font-weight: 800;
  }

  .bottom-text {
    margin-top: 10px;
    font-size: 14px;
    color: #aaaaaa;
  }
</style>
</head>

<body>

<div class="app">

  <h1>Сравнение яркости</h1>

  <div class="top-text">
    Двигайте линии пальцем. Горизонтально — каждую отдельно, вертикально — обе сразу.
  </div>

  <div class="camera-box" id="cameraBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <button id="startBtn">Открыть камеру</button>

  <div class="result" id="result">Камера не открыта</div>

  <div class="bottom-text">
    Более тёмная линия меняет цвет
  </div>

</div>

<script>
const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");
const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");
const cameraBox = document.getElementById("cameraBox");

const hiddenCanvas = document.createElement("canvas");
const hiddenCtx = hiddenCanvas.getContext("2d", { willReadFrequently: true });

let cameraStarted = false;

const lines = [
  { id: "A", x: 38 },
  { id: "B", x: 62 }
];

let lineY1 = 25;
let lineY2 = 75;

let activeLine = null;
let isResizingVertical = false;

const history = [];
const AVERAGE_TIME = 10000;

startBtn.addEventListener("click", async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      cameraStarted = true;
      startBtn.style.display = "none";
      loop();
    };

  } catch (err) {
    result.textContent = "Ошибка открытия камеры";
    alert("Ошибка камеры: " + err.message);
  }
});

cameraBox.addEventListener("pointerdown", e => {
  e.preventDefault();

  const pos = getPointerPercent(e);

  const distanceToLine0 = Math.abs(pos.x - lines[0].x);
  const distanceToLine1 = Math.abs(pos.x - lines[1].x);

  const distanceToTop = Math.abs(pos.y - lineY1);
  const distanceToBottom = Math.abs(pos.y - lineY2);

  if (distanceToTop < 8 || distanceToBottom < 8) {
    isResizingVertical = true;
    activeLine = null;
  } else {
    activeLine = distanceToLine0 < distanceToLine1 ? 0 : 1;
    isResizingVertical = false;
  }

  cameraBox.setPointerCapture(e.pointerId);
});

cameraBox.addEventListener("pointermove", e => {
  e.preventDefault();

  if (activeLine === null && !isResizingVertical) return;

  const pos = getPointerPercent(e);

  if (isResizingVertical) {
    const center = (lineY1 + lineY2) / 2;
    let halfSize = Math.abs(pos.y - center);

    halfSize = clamp(halfSize, 10, 45);

    lineY1 = center - halfSize;
    lineY2 = center + halfSize;
  } else {
    lines[activeLine].x = clamp(pos.x, 8, 92);
  }
});

cameraBox.addEventListener("pointerup", stopDrag);
cameraBox.addEventListener("pointercancel", stopDrag);

function stopDrag(e) {
  if (e) e.preventDefault();

  activeLine = null;
  isResizingVertical = false;

  history.length = 0;
}

function getPointerPercent(e) {
  const rect = cameraBox.getBoundingClientRect();

  return {
    x: ((e.clientX - rect.left) / rect.width) * 100,
    y: ((e.clientY - rect.top) / rect.height) * 100
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function resizeCanvas() {
  const box = canvas.getBoundingClientRect();

  canvas.width = box.width;
  canvas.height = box.height;

  hiddenCanvas.width = video.videoWidth;
  hiddenCanvas.height = video.videoHeight;
}

function getBrightness(line) {
  const w = hiddenCanvas.width;
  const h = hiddenCanvas.height;

  const x = Math.round(line.x / 100 * w);
  const y1 = lineY1 / 100 * h;
  const y2 = lineY2 / 100 * h;

  const steps = 120;
  let total = 0;

  for (let i = 0; i < steps; i++) {
    const t = i / (steps - 1);
    const y = Math.round(y1 + (y2 - y1) * t);

    const pixel = hiddenCtx.getImageData(x, y, 1, 1).data;

    total += 0.299 * pixel[0] + 0.587 * pixel[1] + 0.114 * pixel[2];
  }

  return total / steps;
}

function getVisualLines() {
  const sorted = [...lines].sort((a, b) => a.x - b.x);

  return {
    left: sorted[0],
    right: sorted[1]
  };
}

function addToHistory(leftBrightness, rightBrightness) {
  const now = performance.now();

  history.push({
    time: now,
    left: leftBrightness,
    right: rightBrightness
  });

  while (history.length && now - history[0].time > AVERAGE_TIME) {
    history.shift();
  }
}

function getAverageBrightness() {
  if (!history.length) {
    return { left: 0, right: 0 };
  }

  let leftTotal = 0;
  let rightTotal = 0;

  for (const item of history) {
    leftTotal += item.left;
    rightTotal += item.right;
  }

  return {
    left: leftTotal / history.length,
    right: rightTotal / history.length
  };
}

function drawLine(line, isDarker) {
  const w = canvas.width;
  const h = canvas.height;

  const x = line.x / 100 * w;
  const y1 = lineY1 / 100 * h;
  const y2 = lineY2 / 100 * h;

  ctx.lineWidth = 7;
  ctx.lineCap = "round";

  ctx.strokeStyle = isDarker
    ? "rgba(255, 70, 70, 0.55)"
    : "rgba(0, 255, 150, 0.42)";

  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.45)";

  ctx.beginPath();
  ctx.arc(x, y1, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y2, 8, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  if (!cameraStarted) return;

  if (video.videoWidth && video.videoHeight) {
    resizeCanvas();

    hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const visual = getVisualLines();

    const leftNow = getBrightness(visual.left);
    const rightNow = getBrightness(visual.right);

    addToHistory(leftNow, rightNow);

    const average = getAverageBrightness();

    drawLine(visual.left, average.left < average.right);
    drawLine(visual.right, average.right < average.left);

    const max = Math.max(average.left, average.right);
    const min = Math.min(average.left, average.right);

    const percent = min > 0 ? ((max - min) / min) * 100 : 0;

    if (average.left > average.right) {
      result.textContent = `Левая ярче на ${percent.toFixed(1)}%`;
    } else if (average.right > average.left) {
      result.textContent = `Правая ярче на ${percent.toFixed(1)}%`;
    } else {
      result.textContent = "Яркость одинаковая";
    }
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
