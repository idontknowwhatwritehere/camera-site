<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

<title>Сравнение яркости</title>

<style>
  * {
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
  }

  html,
  body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    overscroll-behavior: none;
    background: #070707;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
  }

  body {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: var(--app-height, 100dvh);
  }

  .app {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: var(--app-height, 100dvh);
    padding:
      calc(env(safe-area-inset-top) + 5px)
      10px
      calc(env(safe-area-inset-bottom) + 5px);
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    background: linear-gradient(135deg, #050505, #171717);
  }

  .top-bar,
  .mode-buttons,
  .camera-box,
  .result,
  .top-text,
  .bottom-text {
    width: 100%;
    max-width: 390px;
  }

  .top-bar {
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }

  button {
    border: none;
    border-radius: 999px;
    background: linear-gradient(135deg, #00ff88, #00b7ff);
    color: black;
    font-weight: 900;
    cursor: pointer;
    font-family: inherit;
  }

  .icon-btn {
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 12px;
    font-size: 19px;
    line-height: 1;
    background: rgba(255,255,255,.14);
    color: white;
  }

  .login-btn {
    height: 32px;
    padding: 0 12px;
    border-radius: 12px;
    font-size: 13px;
    background: rgba(255,255,255,.14);
    color: white;
  }

  .mode-buttons {
    display: flex;
    gap: 7px;
    margin-top: 6px;
    flex-shrink: 0;
  }

  .mode-buttons button {
    flex: 1;
    min-width: 0;
    height: 32px;
    padding: 0 6px;
    font-size: 15px;
    white-space: nowrap;
  }

  button.secondary {
    background: rgba(255,255,255,.15);
    color: white;
  }

  h1 {
    margin: 6px 0 3px;
    font-size: 21px;
    line-height: 1;
    flex-shrink: 0;
    white-space: nowrap;
  }

  .top-text {
    margin-bottom: 6px;
    font-size: 11px;
    line-height: 1.15;
    color: #cfcfcf;
    text-align: center;
    flex-shrink: 0;
  }

  .camera-box {
    position: relative;
    height: min(47vh, 410px);
    min-height: 310px;
    border-radius: 21px;
    overflow: hidden;
    background: #111;
    box-shadow: 0 10px 26px rgba(0,0,0,.55);
    border: 2px solid rgba(255,255,255,.12);
    touch-action: none;
    flex-shrink: 0;
  }

  video,
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    pointer-events: none;
  }

  #startBtn {
    position: absolute;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    padding: 13px 20px;
    z-index: 5;
    font-size: 15px;
    white-space: nowrap;
    box-shadow: 0 10px 30px rgba(0,255,170,.35);
  }

  #scanBtn {
    display: none;
    margin-top: 9px;
    height: 42px;
    padding: 0 22px;
    font-size: 17px;
    flex-shrink: 0;
    max-width: 100%;
    white-space: nowrap;
  }

  .result {
    margin-top: 8px;
    min-height: 34px;
    font-size: 18px;
    font-weight: 900;
    line-height: 1.05;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .bottom-text {
    margin-top: 3px;
    font-size: 11px;
    line-height: 1.1;
    color: #aaaaaa;
    text-align: center;
    flex-shrink: 0;
  }

  @media (max-height: 700px) {
    .camera-box {
      height: min(43vh, 360px);
      min-height: 270px;
    }

    h1 {
      font-size: 19px;
      margin-top: 4px;
    }

    .top-text {
      font-size: 10px;
      margin-bottom: 5px;
    }

    #scanBtn {
      height: 38px;
      font-size: 15px;
      margin-top: 7px;
    }

    .result {
      font-size: 16px;
      min-height: 30px;
      margin-top: 6px;
    }

    .bottom-text {
      font-size: 10px;
    }
  }
   .shade {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    z-index: 20;
  }

  .shade.open {
    opacity: 1;
    pointer-events: auto;
  }

  .side-menu {
    position: fixed;
    left: 0;
    top: 0;
    width: min(82vw, 310px);
    height: var(--app-height, 100dvh);
    padding:
      calc(env(safe-area-inset-top) + 14px)
      14px
      calc(env(safe-area-inset-bottom) + 14px);
    background: rgba(18,18,18,.96);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    transform: translateX(-105%);
    transition: transform .28s ease;
    z-index: 30;
    box-shadow: 20px 0 50px rgba(0,0,0,.45);
    border-right: 1px solid rgba(255,255,255,.12);
  }

  .side-menu.open {
    transform: translateX(0);
  }

  .side-menu-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }

  .side-menu-header strong {
    display: block;
    font-size: 22px;
  }

  .side-menu-header span {
    display: block;
    margin-top: 3px;
    font-size: 12px;
    color: #aaa;
  }

  #closeMenuBtn {
    width: 34px;
    height: 34px;
    padding: 0;
    border-radius: 12px;
    background: rgba(255,255,255,.12);
    color: white;
    font-size: 24px;
  }

  .menu-item {
    width: 100%;
    height: 44px;
    margin-bottom: 10px;
    padding: 0 14px;
    text-align: left;
    border-radius: 14px;
    background: rgba(255,255,255,.1);
    color: white;
    font-size: 15px;
  }

  .menu-item:active {
    transform: scale(.98);
  }

  .login-modal {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    background: rgba(0,0,0,.55);
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
    z-index: 40;
  }

  .login-modal.open {
    opacity: 1;
    pointer-events: auto;
  }

  .login-card {
    position: relative;
    width: 100%;
    max-width: 330px;
    padding: 22px;
    border-radius: 24px;
    background: rgba(22,22,22,.96);
    border: 1px solid rgba(255,255,255,.12);
    box-shadow: 0 20px 60px rgba(0,0,0,.55);
    text-align: center;
  }

  .login-card h2 {
    margin: 0 0 8px;
    font-size: 24px;
  }

  .login-card p {
    margin: 0 0 16px;
    color: #aaa;
    font-size: 13px;
    line-height: 1.35;
  }

  .login-card input {
    width: 100%;
    height: 44px;
    margin-bottom: 10px;
    padding: 0 14px;
    border: none;
    border-radius: 14px;
    background: rgba(255,255,255,.1);
    color: white;
    font-size: 15px;
    outline: none;
  }

  .login-card input::placeholder {
    color: #888;
  }

  #fakeLoginBtn {
    width: 100%;
    height: 44px;
    margin-top: 4px;
  }

  .close-login {
    position: absolute;
    right: 12px;
    top: 12px;
    width: 32px;
    height: 32px;
    padding: 0;
    border-radius: 12px;
    background: rgba(255,255,255,.12);
    color: white;
    font-size: 22px;
  }
</style>
</head>

<body>

<div class="app">

  <div class="top-bar">
    <button class="icon-btn" id="menuBtn">☰</button>
    <button class="login-btn" id="loginBtn">Вход</button>
  </div>

  <div class="mode-buttons">
    <button id="liveModeBtn">Версия 1</button>
    <button id="scanModeBtn" class="secondary">Версия 2</button>
  </div>

  <h1>Сравнение яркости</h1>

  <div class="top-text">
    Двигайте линии пальцем. Высота меняется для обеих сразу.
  </div>

  <div class="camera-box" id="cameraBox">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <button id="startBtn">Открыть камеру</button>
  </div>

  <button id="scanBtn">Сканировать 10 секунд</button>

  <div class="result" id="result">Камера не открыта</div>

  <div class="bottom-text">
    Более тёмная линия подсвечивается красным
  </div>

</div>

<div class="shade" id="shade"></div>

<div class="side-menu" id="sideMenu">
  <div class="side-menu-header">
    <div>
      <strong>Меню</strong>
      <span>Настройки измерения</span>
    </div>
    <button id="closeMenuBtn">×</button>
  </div>

  <button class="menu-item" id="resetLinesBtn">Сбросить линии</button>
  <button class="menu-item" id="centerLinesBtn">Поставить по центру</button>
  <button class="menu-item" id="shortLinesBtn">Короткие линии</button>
  <button class="menu-item" id="longLinesBtn">Длинные линии</button>
</div>

<div class="login-modal" id="loginModal">
  <div class="login-card">
    <button class="close-login" id="closeLoginBtn">×</button>

    <h2>Вход</h2>
    <p>Пока это демо-окно. Здесь потом можно сделать авторизацию.</p>

    <input type="text" placeholder="Имя">
    <input type="password" placeholder="Пароль">

    <button id="fakeLoginBtn">Войти</button>
  </div>
</div>

<script>
function setAppHeight() {
  const height = window.visualViewport
    ? window.visualViewport.height
    : window.innerHeight;

  document.documentElement.style.setProperty("--app-height", `${height}px`);
}

setAppHeight();

window.addEventListener("resize", setAppHeight);
window.addEventListener("orientationchange", setAppHeight);

if (window.visualViewport) {
  window.visualViewport.addEventListener("resize", setAppHeight);
}

document.addEventListener("touchmove", e => {
  e.preventDefault();
}, { passive: false });

const video = document.getElementById("video");
const canvas = document.getElementById("overlay");
const ctx = canvas.getContext("2d");

const result = document.getElementById("result");
const startBtn = document.getElementById("startBtn");
const scanBtn = document.getElementById("scanBtn");
const cameraBox = document.getElementById("cameraBox");

const liveModeBtn = document.getElementById("liveModeBtn");
const scanModeBtn = document.getElementById("scanModeBtn");
const menuBtn = document.getElementById("menuBtn");
const closeMenuBtn = document.getElementById("closeMenuBtn");
const sideMenu = document.getElementById("sideMenu");
const shade = document.getElementById("shade");

const loginBtn = document.getElementById("loginBtn");
const loginModal = document.getElementById("loginModal");
const closeLoginBtn = document.getElementById("closeLoginBtn");
const fakeLoginBtn = document.getElementById("fakeLoginBtn");

const resetLinesBtn = document.getElementById("resetLinesBtn");
const centerLinesBtn = document.getElementById("centerLinesBtn");
const shortLinesBtn = document.getElementById("shortLinesBtn");
const longLinesBtn = document.getElementById("longLinesBtn");
const hiddenCanvas = document.createElement("canvas");
const hiddenCtx = hiddenCanvas.getContext("2d", { willReadFrequently: true });

let cameraStarted = false;
let mode = "live";

const lines = [
  { x: 38 },
  { x: 62 }
];

let lineY1 = 25;
let lineY2 = 75;

let activeLine = null;
let resizingEdge = null;

const AVERAGE_TIME = 10000;

let liveHistory = [];

let isScanning = false;
let scanStartTime = 0;
let scanData = [];
let finalScanResult = null;
function openMenu() {
  sideMenu.classList.add("open");
  shade.classList.add("open");
}

function closeMenu() {
  sideMenu.classList.remove("open");
  shade.classList.remove("open");
}

function openLogin() {
  loginModal.classList.add("open");
}

function closeLogin() {
  loginModal.classList.remove("open");
}

menuBtn.addEventListener("click", openMenu);
closeMenuBtn.addEventListener("click", closeMenu);
shade.addEventListener("click", closeMenu);

loginBtn.addEventListener("click", openLogin);
closeLoginBtn.addEventListener("click", closeLogin);

loginModal.addEventListener("click", e => {
  if (e.target === loginModal) closeLogin();
});

fakeLoginBtn.addEventListener("click", () => {
  loginBtn.textContent = "Гость";
  closeLogin();
});

resetLinesBtn.addEventListener("click", () => {
  lines[0].x = 38;
  lines[1].x = 62;
  lineY1 = 25;
  lineY2 = 75;
  liveHistory = [];
  scanData = [];
  finalScanResult = null;
  isScanning = false;
  closeMenu();
});

centerLinesBtn.addEventListener("click", () => {
  lines[0].x = 42;
  lines[1].x = 58;
  liveHistory = [];
  scanData = [];
  finalScanResult = null;
  isScanning = false;
  closeMenu();
});

shortLinesBtn.addEventListener("click", () => {
  lineY1 = 35;
  lineY2 = 65;
  liveHistory = [];
  scanData = [];
  finalScanResult = null;
  isScanning = false;
  closeMenu();
});

longLinesBtn.addEventListener("click", () => {
  lineY1 = 18;
  lineY2 = 82;
  liveHistory = [];
  scanData = [];
  finalScanResult = null;
  isScanning = false;
  closeMenu();
});
liveModeBtn.addEventListener("click", () => {
  mode = "live";
  isScanning = false;
  scanData = [];
  finalScanResult = null;
  liveHistory = [];

  scanBtn.style.display = "none";

  liveModeBtn.classList.remove("secondary");
  scanModeBtn.classList.add("secondary");

  result.textContent = cameraStarted ? "Живой режим" : "Камера не открыта";
});

scanModeBtn.addEventListener("click", () => {
  mode = "scan";
  isScanning = false;
  scanData = [];
  finalScanResult = null;
  liveHistory = [];

  scanBtn.style.display = "block";

  scanModeBtn.classList.remove("secondary");
  liveModeBtn.classList.add("secondary");

  result.textContent = cameraStarted
    ? "Зафиксируйте камеру и нажмите сканирование"
    : "Камера не открыта";
});

startBtn.addEventListener("click", async e => {
  e.stopPropagation();

  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: "environment" } },
      audio: false
    });

    video.srcObject = stream;

    video.onloadedmetadata = () => {
      video.play();
      cameraStarted = true;
      startBtn.style.display = "none";

      result.textContent = mode === "live"
        ? "Живой режим"
        : "Зафиксируйте камеру и нажмите сканирование";

      loop();
    };

  } catch (err) {
    result.textContent = "Ошибка открытия камеры";
    alert("Ошибка камеры: " + err.message);
  }
});

scanBtn.addEventListener("click", () => {
  if (!cameraStarted || isScanning) return;

  scanData = [];
  finalScanResult = null;
  isScanning = true;
  scanStartTime = performance.now();

  result.textContent = "Сканирование: 10.0 сек";
});

cameraBox.addEventListener("pointerdown", e => {
  if (e.target === startBtn) return;

  e.preventDefault();

  const pos = getPointerPercent(e);

  const dLine0 = Math.abs(pos.x - lines[0].x);
  const dLine1 = Math.abs(pos.x - lines[1].x);

  const dTop = Math.abs(pos.y - lineY1);
  const dBottom = Math.abs(pos.y - lineY2);

  if (dTop < 7) {
    resizingEdge = "top";
    activeLine = null;
  } else if (dBottom < 7) {
    resizingEdge = "bottom";
    activeLine = null;
  } else {
    activeLine = dLine0 < dLine1 ? 0 : 1;
    resizingEdge = null;
  }

  cameraBox.setPointerCapture(e.pointerId);
});

cameraBox.addEventListener("pointermove", e => {
  e.preventDefault();

  if (activeLine === null && resizingEdge === null) return;

  const pos = getPointerPercent(e);

  if (resizingEdge === "top") {
    lineY1 = clamp(pos.y, 5, lineY2 - 12);
  }

  if (resizingEdge === "bottom") {
    lineY2 = clamp(pos.y, lineY1 + 12, 95);
  }

  if (activeLine !== null) {
    lines[activeLine].x = clamp(pos.x, 6, 94);
  }
});

cameraBox.addEventListener("pointerup", stopDrag);
cameraBox.addEventListener("pointercancel", stopDrag);

function stopDrag(e) {
  if (e) e.preventDefault();

  activeLine = null;
  resizingEdge = null;

  liveHistory = [];
  scanData = [];
  finalScanResult = null;
  isScanning = false;

  if (mode === "scan" && cameraStarted) {
    result.textContent = "Положение изменено. Нажмите сканирование заново";
  }
}

function getPointerPercent(e) {
  const rect = cameraBox.getBoundingClientRect();

  return {
    x: ((e.clientX - rect.left) / rect.width) * 100,
    y: ((e.clientY - rect.top) / rect.height) * 100
  };
}

function clamp(value, min, max) {
  return Math.max(min, Math.min(max, value));
}

function resizeCanvas() {
  const box = cameraBox.getBoundingClientRect();

  canvas.width = box.width;
  canvas.height = box.height;

  hiddenCanvas.width = video.videoWidth;
  hiddenCanvas.height = video.videoHeight;
}

function getVisualLines() {
  const sorted = [...lines].sort((a, b) => a.x - b.x);

  return {
    left: sorted[0],
    right: sorted[1]
  };
}

function getBrightness(line) {
  const w = hiddenCanvas.width;
  const h = hiddenCanvas.height;

  const x = Math.round(line.x / 100 * w);
  const y1 = lineY1 / 100 * h;
  const y2 = lineY2 / 100 * h;

  const steps = 120;
  let total = 0;

  for (let i = 0; i < steps; i++) {
    const t = i / (steps - 1);
    const y = Math.round(y1 + (y2 - y1) * t);

    const pixel = hiddenCtx.getImageData(x, y, 1, 1).data;
    total += 0.299 * pixel[0] + 0.587 * pixel[1] + 0.114 * pixel[2];
  }

  return total / steps;
}

function addLiveAverage(left, right) {
  const now = performance.now();

  liveHistory.push({ time: now, left, right });

  while (liveHistory.length && now - liveHistory[0].time > AVERAGE_TIME) {
    liveHistory.shift();
  }
}

function getAverage(data) {
  if (!data.length) return null;

  let left = 0;
  let right = 0;

  for (const item of data) {
    left += item.left;
    right += item.right;
  }

  return {
    left: left / data.length,
    right: right / data.length
  };
}

function formatResult(avg, digits) {
  if (!avg) return "Нет данных";

  const max = Math.max(avg.left, avg.right);
  const min = Math.min(avg.left, avg.right);

  const percent = min > 0 ? ((max - min) / min) * 100 : 0;

  if (avg.left > avg.right) {
    return `Левая ярче на ${percent.toFixed(digits)}%`;
  }

  if (avg.right > avg.left) {
    return `Правая ярче на ${percent.toFixed(digits)}%`;
  }

  return "Яркость одинаковая";
}

function drawLine(line, isDarker) {
  const w = canvas.width;
  const h = canvas.height;

  const x = line.x / 100 * w;
  const y1 = lineY1 / 100 * h;
  const y2 = lineY2 / 100 * h;

  ctx.lineWidth = 7;
  ctx.lineCap = "round";

  ctx.strokeStyle = isDarker
    ? "rgba(255, 70, 70, 0.55)"
    : "rgba(0, 255, 150, 0.42)";

  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.45)";

  ctx.beginPath();
  ctx.arc(x, y1, 8, 0, Math.PI * 2);
  ctx.fill();

  ctx.beginPath();
  ctx.arc(x, y2, 8, 0, Math.PI * 2);
  ctx.fill();
}

function loop() {
  if (!cameraStarted) return;

  if (video.videoWidth && video.videoHeight) {
    resizeCanvas();

    hiddenCtx.drawImage(video, 0, 0, hiddenCanvas.width, hiddenCanvas.height);
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const visual = getVisualLines();

    const leftNow = getBrightness(visual.left);
    const rightNow = getBrightness(visual.right);

    let drawAverage = {
      left: leftNow,
      right: rightNow
    };

    if (mode === "live") {
      addLiveAverage(leftNow, rightNow);

      const avg = getAverage(liveHistory);
      drawAverage = avg || drawAverage;

      result.textContent = formatResult(avg, 1);
    }

    if (mode === "scan") {
      if (isScanning) {
        const now = performance.now();
        const elapsed = now - scanStartTime;
        const remaining = Math.max(0, (AVERAGE_TIME - elapsed) / 1000);

        scanData.push({
          left: leftNow,
          right: rightNow
        });

        result.textContent = `Сканирование: ${remaining.toFixed(1)} сек`;

        if (elapsed >= AVERAGE_TIME) {
          isScanning = false;
          finalScanResult = getAverage(scanData);
          result.textContent = formatResult(finalScanResult, 2);
        }

        drawAverage = getAverage(scanData) || drawAverage;
      } else if (finalScanResult) {
        drawAverage = finalScanResult;
      }
    }

    drawLine(visual.left, drawAverage.left < drawAverage.right);
    drawLine(visual.right, drawAverage.right < drawAverage.left);
  }

  requestAnimationFrame(loop);
}
</script>

</body>
</html>
